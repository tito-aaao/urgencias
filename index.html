<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSCE · Urgencias Pediátricas</title>
<style>
  :root{
    --bg:#0a0e14;
    --panel:#121821;
    --panel2:#161e29;
    --border:#232c38;
    --text:#e7edf3;
    --dim:#93a1b0;
    --mute:#5f6b78;
    --mono:ui-monospace,'SF Mono','Cascadia Mono','JetBrains Mono',Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --good:#35e08a;
    --accent:#35e08a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{padding-bottom:60px;}
  a{color:inherit;}

  /* ---------- topbar ---------- */
  .topbar{
    position:sticky;top:0;z-index:50;
    background:rgba(10,14,20,0.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);
    padding:10px 14px;
  }
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;letter-spacing:.2px;margin-bottom:8px;}
  .brand .pulse{color:var(--good);font-size:18px;animation:beat 1.4s ease-in-out infinite;}
  @keyframes beat{0%,100%{transform:scale(1);}25%{transform:scale(1.25);}40%{transform:scale(1);}}
  .case-pills{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
  .case-pills::-webkit-scrollbar{display:none;}
  .pill{
    flex:0 0 auto;font-family:var(--mono);font-size:11.5px;font-weight:600;
    border:1px solid var(--border);border-radius:20px;padding:7px 12px;
    background:var(--panel);color:var(--dim);cursor:pointer;white-space:nowrap;
    transition:all .15s ease;
  }
  .pill:active{transform:scale(.96);}
  .pill.active{color:#0a0e14;border-color:transparent;font-weight:700;}

  /* ---------- disclaimer ---------- */
  .banner{
    margin:12px 14px;padding:12px 14px;background:var(--panel);border:1px solid var(--border);
    border-left:3px solid #ffb238;border-radius:8px;font-size:12.5px;line-height:1.55;color:var(--dim);
  }
  .banner b{color:var(--text);}
  .banner.small{font-size:11.5px;margin-top:14px;}

  main{max-width:720px;margin:0 auto;padding:0 14px;}

  /* ---------- case header ---------- */
  .case-badge{
    display:inline-block;font-family:var(--mono);font-size:10.5px;font-weight:700;
    letter-spacing:.5px;padding:4px 9px;border-radius:5px;margin-bottom:10px;
    background:color-mix(in srgb, var(--accent) 18%, transparent);color:var(--accent);
  }
  .case-title{font-size:21px;font-weight:800;line-height:1.25;margin:0 0 4px 0;}
  .case-subtitle{font-size:13.5px;color:var(--dim);margin:0 0 16px 0;}

  /* ---------- mode switch ---------- */
  .switch{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:4px;gap:4px;margin-bottom:16px;}
  .switch button{
    flex:1;padding:10px 8px;border:none;border-radius:7px;background:transparent;color:var(--dim);
    font-family:var(--sans);font-weight:700;font-size:13px;cursor:pointer;transition:all .15s ease;
  }
  .switch button.on{background:var(--accent);color:#0a0e14;}

  /* ---------- monitor ---------- */
  .monitor{
    background:#070a0f;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;
  }
  .ecg-wrap{overflow:hidden;height:46px;border-bottom:1px solid var(--border);background:#050708;}
  .ecg-track{display:flex;width:200%;height:100%;animation:scrollECG 2.6s linear infinite;}
  .ecg-track svg{flex:0 0 50%;height:100%;display:block;}
  @keyframes scrollECG{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  .vitals{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);}
  .vital{background:#0d131c;padding:10px 8px;text-align:center;}
  .vital .val{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--good);}
  .vital .lab{font-size:9.5px;color:var(--mute);letter-spacing:.5px;margin-top:2px;text-transform:uppercase;}
  .vital.fc .val{color:#ff6b7a;}
  .vital.sat .val{color:#4ec4ff;}
  .vital.pa .val{color:#e7edf3;}
  .vital.temp .val{color:#ffb238;}
  .vital.peso .val{color:#c0a8ff;}
  .vital.fr .val{color:#35e08a;}

  /* ---------- cards / content blocks ---------- */
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
  .card h4{margin:0 0 8px 0;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);}
  .card p{font-size:14.5px;line-height:1.6;color:var(--text);margin:0;}
  .card p + p{margin-top:8px;}

  /* timer */
  .timer{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px;}
  .timer .tval{font-family:var(--mono);font-size:24px;font-weight:700;letter-spacing:1px;}
  .timer .tval.warn{color:#ff6b7a;}
  .timer button{
    font-family:var(--sans);font-size:12px;font-weight:700;padding:8px 12px;border-radius:7px;
    border:1px solid var(--border);background:var(--panel2);color:var(--text);cursor:pointer;
  }
  .timer .lab{font-size:11px;color:var(--mute);margin-left:auto;}

  /* accordion */
  details.acc{background:var(--panel);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
  details.acc summary{
    list-style:none;cursor:pointer;padding:14px 16px;font-weight:700;font-size:14px;
    display:flex;align-items:center;justify-content:space-between;
  }
  details.acc summary::-webkit-details-marker{display:none;}
  details.acc summary .arrow{color:var(--accent);transition:transform .2s ease;font-size:12px;}
  details.acc[open] summary .arrow{transform:rotate(90deg);}
  details.acc .acc-body{padding:0 16px 16px 16px;font-size:14px;line-height:1.6;color:var(--dim);}
  details.acc .acc-body b, details.acc .acc-body strong{color:var(--text);}

  dl.script dt{font-weight:700;color:var(--text);margin-top:12px;font-size:13.5px;}
  dl.script dt:first-child{margin-top:0;}
  dl.script dd{margin:4px 0 0 0;font-style:italic;color:var(--dim);font-size:13.5px;}

  ul.plain{margin:0;padding-left:18px;}
  ul.plain li{margin-bottom:6px;font-size:14px;}

  /* checklist */
  .score-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .score-track{flex:1;height:8px;background:var(--panel2);border-radius:5px;overflow:hidden;border:1px solid var(--border);}
  .score-fill{height:100%;background:var(--accent);width:0%;transition:width .25s ease;}
  .score-txt{font-family:var(--mono);font-size:12.5px;color:var(--dim);white-space:nowrap;}
  .checklist-group{margin-bottom:14px;}
  .checklist-group h5{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--mute);margin:0 0 8px 0;}
  .chk-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
  .chk-item:last-child{border-bottom:none;}
  .chk-item input{margin-top:3px;width:17px;height:17px;accent-color:var(--accent);flex:0 0 auto;}
  .chk-item label{font-size:13.5px;line-height:1.5;color:var(--dim);}
  .chk-item.checked label{color:var(--text);}
  .chk-item .crit{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;color:#ff6b7a;border:1px solid #ff6b7a55;padding:1px 5px;border-radius:4px;margin-left:6px;vertical-align:middle;}
  .reset-btn{font-family:var(--sans);font-size:11.5px;font-weight:700;color:var(--mute);background:none;border:1px solid var(--border);border-radius:7px;padding:6px 10px;cursor:pointer;margin-top:6px;}

  /* pitfalls */
  .pitfall{background:#1a1013;border:1px solid #3a1e22;border-left:3px solid #ff6b7a;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13.5px;line-height:1.5;color:#f0c3c8;}

  /* flip cards */
  .flip-grid{display:grid;grid-template-columns:1fr;gap:12px;}
  .flip{perspective:1000px;height:150px;cursor:pointer;}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;}
  .flip.on .flip-inner{transform:rotateY(180deg);}
  .flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;padding:14px 16px;
    display:flex;align-items:center;border:1px solid var(--border);}
  .flip-front{background:var(--panel2);}
  .flip-front .tag{font-family:var(--mono);font-size:9.5px;color:var(--accent);display:block;margin-bottom:6px;letter-spacing:.5px;}
  .flip-front p{margin:0;font-size:14px;font-weight:600;color:var(--text);}
  .flip-back{background:color-mix(in srgb, var(--accent) 12%, #10151d);transform:rotateY(180deg);}
  .flip-back p{margin:0;font-size:13px;line-height:1.55;color:var(--text);}
  .tap-hint{font-size:10px;color:var(--mute);position:absolute;bottom:8px;right:12px;}

  .source-note{font-size:11px;color:var(--mute);margin-top:18px;padding-top:12px;border-top:1px dashed var(--border);line-height:1.5;}

  h3.section-h{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--mute);margin:22px 0 10px 0;}
  h3.section-h:first-of-type{margin-top:4px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="pulse">♥</span><span>OSCE · Urgencias Pediátricas</span></div>
  <div class="case-pills" id="casePills"></div>
</div>

<main>
  <div class="banner" id="topBanner"></div>
  <div id="caseContainer"></div>
</main>

}

function renderPills(){
  const el = document.getElementById('casePills');

function renderChecklist(c){
  let flat = [];
  c.checklist.forEach(group => group.items.forEach(it => flat.push(it)));
  const totalPoints = flat.reduce((a,b)=>a+b.p,0);

  let idx = 0;
  let groupsHtml = c.checklist.map(group => {
    let itemsHtml = group.items.map(it => {
      const key = chkKey(c.id, idx);
      const checked = localStorage.getItem(key) === '1';
      const html = `
        <div class="chk-item ${checked?'checked':''}" data-key="${key}" data-points="${it.p}">
          <input type="checkbox" id="${key}" ${checked?'checked':''}>
          <label for="${key}">${it.t}${it.crit?'<span class="crit">CLAVE</span>':''}</label>
        </div>`;
      idx++;
      return html;
    }).join('');
    return `<div class="checklist-group"><h5>${group.section}</h5>${itemsHtml}</div>`;
  }).join('');

  return `
    <div class="score-bar">
      <div class="score-track"><div class="score-fill" id="scoreFill-${c.id}"></div></div>
      <div class="score-txt" id="scoreTxt-${c.id}">0 / ${totalPoints} pts</div>
    </div>
    ${groupsHtml}
    <button class="reset-btn" id="resetChecklist-${c.id}">↺ Reiniciar pauta</button>
  `;
}

function updateScore(c){
  let flat = [];
  c.checklist.forEach(group => group.items.forEach(it => flat.push(it)));
  const totalPoints = flat.reduce((a,b)=>a+b.p,0);
  let earned = 0;
  document.querySelectorAll(`#checklistBody-${c.id} .chk-item`).forEach(el=>{
    const key = el.dataset.key;
    if(localStorage.getItem(key) === '1'){
      earned += parseInt(el.dataset.points);
      el.classList.add('checked');
    } else {
      el.classList.remove('checked');
    }
  });
  const fill = document.getElementById(`scoreFill-${c.id}`);
  const txt = document.getElementById(`scoreTxt-${c.id}`);
  if(fill){ fill.style.width = totalPoints ? (earned/totalPoints*100)+'%' : '0%'; }
  if(txt){ txt.textContent = `${earned} / ${totalPoints} pts`; }
}

function attachHandlers(c, m){
  document.getElementById('btnStudent').addEventListener('click', ()=>{ mode[c.id]='student'; renderCase(); });
  document.getElementById('btnEval').addEventListener('click', ()=>{ mode[c.id]='evaluator'; renderCase(); });

  if(m === 'evaluator'){
    updateScore(c);
    document.querySelectorAll(`#checklistBody-${c.id} .chk-item input`).forEach(inp=>{
      inp.addEventListener('change', ()=>{
        const key = inp.id;
        localStorage.setItem(key, inp.checked ? '1' : '0');
        updateScore(c);
      });
    });
    const resetBtn = document.getElementById(`resetChecklist-${c.id}`);
    if(resetBtn){
      resetBtn.addEventListener('click', ()=>{
        document.querySelectorAll(`#checklistBody-${c.id} .chk-item`).forEach(el=>{
          localStorage.setItem(el.dataset.key, '0');
        });
        renderCase();
      });
    }
    document.querySelectorAll('.flip').forEach(f=>{
      f.addEventListener('click', ()=> f.classList.toggle('on'));
    });
  }

  if(m === 'student'){
    setupTimer(c);
  }
}

function setupTimer(c){
  if(!timers[c.id]) timers[c.id] = { remaining: c.timerMin*60, running:false, handle:null };
  const t = timers[c.id];
  const valEl = document.getElementById('timerVal');
  const toggleBtn = document.getElementById('timerToggle');
  const resetBtn = document.getElementById('timerReset');

  function paint(){
    const mm = Math.floor(t.remaining/60), ss = t.remaining%60;
    valEl.textContent = `${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
    valEl.classList.toggle('warn', t.remaining <= 60);
  }
  paint();

  toggleBtn.addEventListener('click', ()=>{
    if(t.running){
      clearInterval(t.handle); t.running=false; toggleBtn.textContent='▶ Iniciar';
    } else {
      t.running=true; toggleBtn.textContent='⏸ Pausar';
      t.handle = setInterval(()=>{
        if(t.remaining>0){ t.remaining--; paint(); }
        else { clearInterval(t.handle); t.running=false; toggleBtn.textContent='▶ Iniciar'; }
      },1000);
    }
  });
  resetBtn.addEventListener('click', ()=>{
    clearInterval(t.handle); t.running=false; t.remaining=c.timerMin*60; toggleBtn.textContent='▶ Iniciar'; paint();
  });
}

function renderAll(){
  renderPills();
  renderCase();
}

renderAll();
</script>
</body>
</html>
